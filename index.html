<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sist. Préstamos Pro - v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <nav class="bg-slate-800 p-4 shadow-xl mb-6 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-400">PrestamosApp 🚀</h1>
            <div class="space-x-2">
                <button onclick="switchTab('nuevo')" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 transition font-medium">Nuevo</button>
                <button onclick="switchTab('lista')" class="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition font-medium">Clientes</button>
            </div>
        </div>
    </nav>

    <section id="tab-nuevo" class="max-w-2xl mx-auto p-4">
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-center text-white">Registrar Crédito</h2>
            <form id="loanForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="nombre" placeholder="Nombre y Apellido" required class="input-style">
                    <input type="text" id="dni" placeholder="DNI (Opcional)" class="input-style">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="fecha" required class="input-style">
                    <input type="number" id="monto" placeholder="Monto ($)" required class="input-style">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <select id="plazo" class="input-style cursor-pointer">
                        <option value="1w">1 Semana (15%)</option>
                        <option value="2w">2 Semanas (30%)</option>
                        <option value="3w">3 Semanas (45%)</option>
                        <option value="1m">1 Mes (60%)</option>
                        <option value="2m">2 Meses (120%)</option>
                        <option value="3m">3 Meses (180%)</option>
                    </select>
                    <select id="socio" class="input-style cursor-pointer">
                        <option value="Assa">Gestor: Assa</option>
                        <option value="Anto">Gestor: Anto</option>
                    </select>
                </div>

                <div id="resumenFlotante" class="bg-blue-900/30 p-4 rounded-xl border border-blue-500/50 my-4 hidden">
                    <div class="flex justify-between text-sm"><span>Total a Devolver:</span> <b id="resTotal" class="text-white font-bold">$0</b></div>
                    <div class="flex justify-between text-sm text-red-400"><span>Comisionista:</span> <b id="resComision">$0</b></div>
                    <div class="flex justify-between text-sm text-green-400"><span>Tu Ganancia:</span> <b id="resTuya">$0</b></div>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl shadow-lg transition transform active:scale-95">
                    Guardar Préstamo
                </button>
            </form>
        </div>
    </section>

    <section id="tab-lista" class="hidden max-w-5xl mx-auto p-4">
        <div class="bg-slate-800 rounded-xl border border-slate-700 p-4 mb-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-slate-400 font-bold text-sm uppercase tracking-wider">Resumen de Cartera</h3>
                <button onclick="toggleVisibilidadTotales()" class="text-blue-400 hover:text-blue-300 text-sm font-medium flex items-center gap-2">
                    <span id="eyeIcon">👁️</span> <span id="eyeText">Mostrar Totales</span>
                </button>
            </div>
            
            <div id="contenedorTotales" class="grid grid-cols-1 md:grid-cols-3 gap-4 blur-sm select-none transition-all duration-500 opacity-50">
                <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-500 uppercase">Capital en la calle</p>
                    <p id="totalCapital" class="text-2xl font-black text-white">$0</p>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-500 uppercase">Ganancia Proyectada</p>
                    <p id="totalGanancia" class="text-2xl font-black text-green-400">$0</p>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                    <p class="text-xs text-slate-500 uppercase">Total a Cobrar</p>
                    <p id="totalGeneral" class="text-2xl font-black text-blue-400">$0</p>
                </div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <input type="text" id="buscador" placeholder="🔍 Buscar por nombre o DNI..." class="flex-1 p-4 bg-slate-800 rounded-xl border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none text-white shadow-lg">
            
            <select id="filtroSocio" onchange="renderizarLista()" class="bg-slate-800 text-white p-4 rounded-xl border border-slate-700 outline-none cursor-pointer focus:ring-2 focus:ring-blue-500">
                <option value="todos">Todos los Socios</option>
                <option value="Assa">Assa</option>
                <option value="Anto">Anto</option>
            </select>
        </div>
        
        <div class="grid grid-cols-1 gap-4" id="listaPrestamos">
            </div>
    </section>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-slate-800 w-full max-w-2xl rounded-2xl p-6 relative max-h-[90vh] overflow-y-auto border border-slate-600 shadow-2xl">
            <button onclick="cerrarModal()" class="absolute top-4 right-4 text-3xl text-slate-400 hover:text-white">&times;</button>
            <div id="modalContent">
                <div class="flex items-center gap-3 mb-1">
                    <h3 id="modalNombre" class="text-3xl font-bold text-blue-400"></h3>
                    <span id="modalSocioTag" class="px-2 py-1 rounded text-[10px] font-black uppercase text-white"></span>
                </div>
                <p id="modalMeta" class="text-slate-400 text-sm mb-6"></p>
                
                <div class="grid grid-cols-1 gap-3" id="cronogramaPagos"></div>
                
                <div class="mt-8 pt-6 border-t border-slate-700 flex justify-between items-center">
                    <p class="text-xs text-slate-500 italic">Los estados se calculan según la fecha actual.</p>
                    <button id="btnEliminar" class="bg-red-900/50 text-red-400 px-6 py-2 rounded-lg hover:bg-red-600 hover:text-white transition font-bold text-sm">
                        ELIMINAR CLIENTE
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
